version: 2

models:
  - name: stg_aw__salesorderheader
    description: "Cleaned and typed sales order header table."
    columns:
      - name: salesorderid
        data_tests:
          - unique
          - not_null

      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6]

  - name: stg_aw__product
    columns:
      - name: productid
        data_tests:
          - unique
          - not_null

  - name: stg_aw__customer
    columns:
      - name: customerid
        data_tests:
          - unique
          - not_null

      - name: personid
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_aw__person')
                field: businessentityid