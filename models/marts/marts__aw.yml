version: 2

models:
  - name: fct_sales
    description: "Final sales header fact table. Grain: one row per sales order."
    columns:
      - name: sales_order_id
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - not_null
      - name: total_amount_due
        tests:
          - not_null

  - name: fct_sales_details
    description: "Final sales item fact table. Grain: one row per order line item."
    columns:
      - name: sales_order_detail_id
        tests:
          - unique
          - not_null
      - name: sales_order_id
        tests:
          - not_null
      - name: net_total
        description: "Total value after discounts for the specific item."
        tests:
          - not_null

  - name: dim_product
    description: "Final product dimension with category hierarchy."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: product_name
        tests:
          - not_null

  - name: dim_customer
    description: "Final customer dimension with concatenated full names."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_region
    description: "Final region dimension from address to country level."
    columns:
      - name: address_id
        tests:
          - unique
          - not_null

  - name: dim_credit_card
    description: "Final credit card dimension."
    columns:
      - name: credit_card_id
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: "Date dimension for time-series analysis."
    columns:
      - name: date_id
        tests:
          - unique
          - not_null
