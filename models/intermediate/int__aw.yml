version: 2

models:
  - name: int__aw__dim_credit_card
    columns:
      - name: creditcardid
        tests:
          - unique
          - not_null

  - name: int__aw__dim_customer
    columns:
      - name: customerid
        tests:
          - unique
          - not_null

  - name: int__aw__dim_product
    columns:
      - name: productid
        tests:
          - unique
          - not_null

  - name: int__aw__dim_region
    columns:
      - name: addressid
        tests:
          - unique
          - not_null
      - name: stateprovinceid
        tests:
          - not_null

  - name: int__aw__fct_sales
    columns:
      - name: salesorderid
        tests:
          - unique
          - not_null
      - name: customerid
        tests:
          - not_null
      - name: totaldue
        tests:
          - not_null

  - name: int__aw__fct_sales_details
    columns:
      - name: salesorderdetailid
        tests:
          - unique
          - not_null
      - name: salesorderid
        tests:
          - not_null
      - name: productid
        tests:
          - not_null
      - name: orderqty
        tests:
          - not_null
      - name: net_total
        tests:
          - not_null
